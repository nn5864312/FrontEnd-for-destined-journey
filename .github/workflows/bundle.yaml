name: bundle
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 # 用最新的 Node

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9 # 用较新的 pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile # 强制更新依赖

      - name: Build
        run: pnpm build || echo "Build failed but trying to continue..." # 即使 build 有小错也尝试继续

      - name: Add and commit
        uses: EndBug/add-and-commit@v9
        with:
          author_name: github-actions[bot]
          author_email: github-actions[bot]@users.noreply.github.com
          message: '[bot] bundle'
          add: 'dist' # 只提交编译后的目录
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
